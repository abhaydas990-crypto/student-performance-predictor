<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="header">
        <h1>🎓 Student Performance Predictor</h1>
        <p>Predict a student's Math Score using Machine Learning</p>
    </div>

    <form id="predictionForm">

        <div class="input-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="input-group">
            <label>Race / Ethnicity</label>
            <select name="race_ethnicity" required>
                <option value="">Select Group</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="input-group">
            <label>Parental Education</label>
            <select name="parental_level_of_education" required>
                <option value="">Select Education</option>
                <option value="some high school">Some High School</option>
                <option value="high school">High School</option>
                <option value="some college">Some College</option>
                <option value="associate's degree">Associate Degree</option>
                <option value="bachelor's degree">Bachelor Degree</option>
                <option value="master's degree">Master Degree</option>
            </select>
        </div>

        <div class="input-group">
            <label>Lunch Type</label>
            <select name="lunch" required>
                <option value="">Select Lunch Type</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free / Reduced</option>
            </select>
        </div>

        <div class="input-group">
            <label>Test Preparation</label>
            <select name="test_preparation_course" required>
                <option value="">Select Status</option>
                <option value="none">Not Completed</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="input-group">
            <label>Reading Score</label>
            <input type="number" name="reading_score" min="0" max="100" required>
        </div>

        <div class="input-group">
            <label>Writing Score</label>
            <input type="number" name="writing_score" min="0" max="100" required>
        </div>

        <button type="submit" id="predictBtn">
            Predict Performance
        </button>

    </form>

    <div class="result-card hidden" id="resultCard">
        <h2>Prediction Result</h2>
        <div id="predictionValue">0</div>
        <p>Predicted Math Score</p>
    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
